name: CI

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Validate tag matches project version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PROJECT_VERSION=$(grep -oPm1 '(?<=<Version>)[^<]+' src/DependencyInjection.Lifetime.Analyzers/DependencyInjection.Lifetime.Analyzers.csproj)
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          echo "Tag version: $TAG_VERSION"
          echo "Project version: $PROJECT_VERSION"

          if [ "$TAG_VERSION" != "$PROJECT_VERSION" ]; then
            echo "Tag version does not match project version."
            exit 1
          fi

      - name: Verify version-synced README install snippets
        run: node tools/generate-growth-assets.mjs sync-readme --check

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test with coverage
        run: dotnet test --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./coverage

      - name: Generate coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        with:
          reports: ./coverage/**/coverage.cobertura.xml
          targetdir: ./coverage/report
          reporttypes: Cobertura;MarkdownSummaryGithub;Badges

      - name: Enforce coverage thresholds
        run: |
          COVERAGE_FILE="./coverage/report/Cobertura.xml"
          if [ ! -f "$COVERAGE_FILE" ]; then
            echo "Merged coverage file not found at $COVERAGE_FILE."
            exit 1
          fi

          LINE_RATE=$(grep -o 'line-rate="[0-9.]*"' "$COVERAGE_FILE" | head -n 1 | cut -d'"' -f2)
          BRANCH_RATE=$(grep -o 'branch-rate="[0-9.]*"' "$COVERAGE_FILE" | head -n 1 | cut -d'"' -f2)
          if [ -z "$LINE_RATE" ] || [ -z "$BRANCH_RATE" ]; then
            echo "Failed to parse line/branch coverage from $COVERAGE_FILE."
            exit 1
          fi

          LINE_THRESHOLD=0.85
          BRANCH_THRESHOLD=0.70

          echo "Line coverage: $LINE_RATE (threshold: $LINE_THRESHOLD)"
          echo "Branch coverage: $BRANCH_RATE (threshold: $BRANCH_THRESHOLD)"

          awk "BEGIN {exit !($LINE_RATE >= $LINE_THRESHOLD)}" || { echo "Line coverage below threshold"; exit 1; }
          awk "BEGIN {exit !($BRANCH_RATE >= $BRANCH_THRESHOLD)}" || { echo "Branch coverage below threshold"; exit 1; }

      - name: Create badges directory
        run: mkdir -p .github/badges

      - name: Copy coverage badge
        run: cp ./coverage/report/badge_linecoverage.svg .github/badges/coverage.svg

      - name: Commit coverage badge
        if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .github/badges/coverage.svg
          git diff --staged --quiet || git commit -m "Update coverage badge [skip ci]"
          git push

      - name: Add coverage PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          recreate: true
          path: ./coverage/report/SummaryGithub.md

      - name: Clean package artifacts
        run: rm -f ./artifacts/*.nupkg

      - name: Generate curated release notes
        if: startsWith(github.ref, 'refs/tags/v')
        run: node tools/generate-growth-assets.mjs release-notes --version "${GITHUB_REF_NAME#v}" --output-dir ./artifacts/release-notes

      - name: Pack branch package
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: dotnet pack --no-build --configuration Release --output ./artifacts

      - name: Pack release candidate package
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          node tools/pack-package-with-release-notes.mjs \
            --project src/DependencyInjection.Lifetime.Analyzers/DependencyInjection.Lifetime.Analyzers.csproj \
            --configuration Release \
            --output ./artifacts \
            --release-notes-file ./artifacts/release-notes/package-release-notes.txt

      - name: Upload NuGet package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: ./artifacts/*.nupkg
          retention-days: 7

      - name: Upload release package artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: release-package
          path: ./artifacts/*.nupkg
          retention-days: 7

      - name: Upload release notes artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: ./artifacts/release-notes
          retention-days: 7

      - name: Prepare release metadata
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p ./artifacts/release-metadata
          printf '%s\n' "${GITHUB_REF_NAME}" > ./artifacts/release-metadata/tag.txt
          printf '%s\n' "${GITHUB_REF_NAME#v}" > ./artifacts/release-metadata/version.txt

      - name: Upload release metadata artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: release-metadata
          path: ./artifacts/release-metadata
          retention-days: 7

      - name: Generate docs site
        run: node tools/generate-growth-assets.mjs site --output-dir ./artifacts/site

      - name: Upload docs site artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: ./artifacts/site
          retention-days: 7
