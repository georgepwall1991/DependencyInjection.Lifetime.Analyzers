name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  inspect:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.inspect.outputs.should_release }}
    steps:
      - name: Inspect CI artifacts
        id: inspect
        uses: actions/github-script@v7
        with:
          script: |
            const runId = context.payload.workflow_run.id;
            const artifacts = await github.paginate(github.rest.actions.listWorkflowRunArtifacts, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
              per_page: 100,
            });

            const artifactNames = new Set(artifacts.map(artifact => artifact.name));
            const shouldRelease =
              context.payload.workflow_run.conclusion === "success" &&
              context.payload.workflow_run.event === "push" &&
              artifactNames.has("release-package") &&
              artifactNames.has("release-notes") &&
              artifactNames.has("release-metadata");

            core.info(`Workflow run ID: ${runId}`);
            core.info(`Artifacts: ${[...artifactNames].sort().join(", ") || "(none)"}`);
            core.setOutput("should_release", shouldRelease ? "true" : "false");

  release:
    needs: inspect
    if: needs.inspect.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download release package artifact
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          name: release-package
          path: ./artifacts/package

      - name: Download release notes artifact
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          name: release-notes
          path: ./artifacts/release-notes

      - name: Download release metadata artifact
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          name: release-metadata
          path: ./artifacts/metadata

      - name: Load release metadata
        id: metadata
        run: |
          TAG_NAME=$(tr -d '\n' < ./artifacts/metadata/tag.txt)
          VERSION=$(tr -d '\n' < ./artifacts/metadata/version.txt)
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Push to NuGet
        run: dotnet nuget push ./artifacts/package/DependencyInjection.Lifetime.Analyzers.*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.metadata.outputs.tag_name }}
          files: ./artifacts/package/DependencyInjection.Lifetime.Analyzers.*.nupkg
          body_path: ./artifacts/release-notes/github-release.md
